<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <h1>Currency Converter</h1>
        <div class="currency-container">
            <!-- for input  -->
            <select id="currency-first">
                <option value="AUD">AUD</option>
                <option value="CAD">CAD</option>
                <option value="EUR">EUR</option>
                <option value="USD" selected>USD</option>  <!--By default , it is selected-->
                <option value="INR">INR</option>
                <option value="GBP">GBP</option>
                <option value="JPY">JPY</option>
            </select>
            <input type="number" id="worth-first" value="1" min="0">
        </div>
        <div class="currency-container">
            <!-- for output -->
            <select id="currency-second">
                <option value="AUD">AUD</option>
                <option value="CAD">CAD</option>
                <option value="EUR">EUR</option>
                <option value="USD">USD</option>  <!--By default , it is selected-->
                <option value="INR" selected>INR</option>
                <option value="GBP">GBP</option>
                <option value="JPY">JPY</option>
            </select>
            <input type="number" id="worth-second" disabled>
        </div>
        <p class="exchange-rate" id="exchange-rate">1 USD = 85 INR</p>  <!-- ohh maah bad its 94.70 -->
    </main>
    <script src="./app.js"></script>
</body>
</html>
